<!DOCTYPE html>
<html lang="en">
<head>
<!-- Icons + Manifest -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="icon" href="favicon.ico">

<link rel="manifest" href="site.webmanifest">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RC/RK 2026 – Eternal Happiness / Ewiges Glück – Notes</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #f6f4ef;
  --card:       #ffffff;
  --border:     #e4ddd2;
  --text:       #1d1a15;
  --text-sub:   #6a6058;
  --text-ref:   #9c9188;

  --fri:        #c66228;
  --sat:        #2b7a4e;
  --sun:        #1b5e8a;

  --badge-address:   #c66228;
  --badge-drama:     #6d3d90;
  --badge-symposium: #2b7a4e;
  --badge-baptism:   #1b5e8a;
  --badge-public:    #1b5e8a;
  --badge-wt:        #7a7060;
  --badge-talk:      #5a5244;

  --notes-bg:     #fffef9;
  --notes-border: #e5dfc6;

  --chip-bg:      #eaf5ee;
  --chip-text:    #1a5933;
  --chip-border:  #aed8bc;

  --radius: 10px;
  --shadow: 0 1px 4px rgba(0,0,0,.07);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  -webkit-text-size-adjust: 100%;
  overflow-x: hidden;
}

/* ── HEADER ─────────────────────────────── */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: #fff;
  border-bottom: 1px solid var(--border);
  box-shadow: 0 2px 10px rgba(0,0,0,.09);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 14px 5px;
  max-width: 700px;
  margin: 0 auto;
}

.app-branding {}

.app-title {
  font-size: 15px; font-weight: 800;
  color: var(--text); letter-spacing: -.02em;
  line-height: 1.2;
}

.app-subtitle {
  font-size: 10.5px; color: var(--text-sub);
  margin-top: 1px; font-weight: 400;
}

.header-actions { display: flex; gap: 5px; flex-shrink: 0; }

.btn-hdr {
  border: 1px solid var(--border);
  background: var(--bg);
  border-radius: 8px;
  padding: 5px 9px;
  font-size: 11px; font-weight: 600;
  cursor: pointer; color: var(--text-sub);
  white-space: nowrap;
  transition: background .15s, color .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-hdr:active { background: var(--border); color: var(--text); }

/* ── DAY TABS ────────────────────────────── */
.day-tabs {
  display: flex; gap: 7px;
  padding: 5px 14px 9px;
  max-width: 700px; margin: 0 auto;
}

.tab-btn {
  flex: 1; padding: 7px 4px;
  border: 2px solid var(--border);
  border-radius: 22px;
  font-size: 12.5px; font-weight: 700;
  background: var(--bg); color: var(--text-sub);
  cursor: pointer; text-align: center;
  transition: all .18s ease;
  -webkit-tap-highlight-color: transparent;
}
.tab-btn.t-fri { border-color: var(--fri); color: var(--fri); }
.tab-btn.t-sat { border-color: var(--sat); color: var(--sat); }
.tab-btn.t-sun { border-color: var(--sun); color: var(--sun); }
.tab-btn.t-fri.active { background: var(--fri); color: #fff; }
.tab-btn.t-sat.active { background: var(--sat); color: #fff; }
.tab-btn.t-sun.active { background: var(--sun); color: #fff; }

/* ── PANELS ──────────────────────────────── */
.day-panel {
  display: none;
  padding: 14px 12px 20px;
  max-width: 700px; margin: 0 auto;
}
.day-panel.active { display: block; }

/* ── DAY THEME BANNER ────────────────────── */
.day-theme {
  border-radius: var(--radius);
  padding: 11px 15px 10px;
  margin-bottom: 12px;
  border-left: 4px solid var(--day-color, var(--fri));
  background: var(--card);
  box-shadow: var(--shadow);
  font-style: italic;
  font-size: 13.5px; color: var(--text-sub);
  line-height: 1.4;
}
.day-theme strong {
  display: block; font-size: 10px; font-style: normal;
  font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
  color: var(--text-ref); margin-top: 3px;
}

/* ── SESSION HEADER ──────────────────────── */
.session-hdr {
  display: inline-flex; align-items: center; gap: 6px;
  margin: 18px 0 8px;
  font-size: 10.5px; font-weight: 800;
  letter-spacing: .09em; text-transform: uppercase;
  color: #fff;
  background: var(--day-color, var(--fri));
  padding: 4px 12px; border-radius: 6px;
}

/* ── ITEM CARD ───────────────────────────── */
.item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 7px;
  overflow: hidden;
  box-shadow: var(--shadow);
}

/* Simple (song / music) */
.item-simple {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 13px;
  opacity: .55;
}
.item-simple .item-time { font-size: 11px; font-weight: 700; color: var(--text-ref); min-width: 32px; }
.item-simple .item-title { font-size: 12.5px; color: var(--text-sub); }

/* Noteworthy header row */
.item-hdr {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 11px 13px 7px;
}

.item-time {
  font-size: 11.5px; font-weight: 800;
  color: var(--day-color, var(--fri));
  min-width: 34px; padding-top: 2px;
  white-space: nowrap; flex-shrink: 0;
}

.item-body { flex: 1; min-width: 0; }

.badge {
  display: inline-block;
  font-size: 9.5px; font-weight: 800;
  letter-spacing: .06em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px;
  color: #fff; margin-bottom: 3px;
}
.badge-address   { background: var(--badge-address); }
.badge-drama     { background: var(--badge-drama); }
.badge-symposium { background: var(--badge-symposium); }
.badge-baptism   { background: var(--badge-baptism); }
.badge-public    { background: var(--badge-public); }
.badge-wt        { background: var(--badge-wt); }
.badge-talk      { background: var(--badge-talk); }

.item-title {
  display: block;
  font-size: 14px; font-weight: 700;
  color: var(--text); line-height: 1.35;
}

.prog-refs {
  font-size: 11px; color: var(--text-ref);
  font-style: italic; margin-top: 2px;
  line-height: 1.4;
}

/* ── NOTES AREA ──────────────────────────── */
.notes-area {
  padding: 6px 12px 9px;
  background: var(--notes-bg);
  border-top: 1px solid var(--notes-border);
}

.notes-ta {
  width: 100%;
  border: 1px solid var(--notes-border);
  border-radius: 7px;
  padding: 8px 32px 8px 10px;
  font-size: 13.5px; font-family: inherit;
  background: #fff; color: var(--text);
  resize: none; min-height: 56px;
  outline: none; line-height: 1.55;
  transition: border-color .15s, box-shadow .15s;
  field-sizing: content;
}
.notes-ta:focus {
  border-color: var(--day-color, var(--fri));
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--day-color, var(--fri)) 12%, transparent);
}
.notes-ta::placeholder { color: #bfb8ae; }

.notes-wrap { position: relative; }

.btn-clear-ta {
  position: absolute;
  top: 7px; right: 7px;
  width: 18px; height: 18px;
  border: none;
  background: var(--text-ref);
  border-radius: 50%;
  font-size: 10px; font-weight: 700;
  line-height: 1; cursor: pointer;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
  opacity: 0; pointer-events: none;
  transition: opacity .15s, background .15s;
}
.btn-clear-ta.vis { opacity: 1; pointer-events: auto; }
.btn-clear-ta:hover { background: var(--text-sub); }

/* ── BIBLE REFS ───────────────────────────── */
.refs-row {
  display: flex; flex-wrap: wrap; gap: 5px;
  margin-top: 6px;
}

.ref-chip {
  display: inline-flex; align-items: center; gap: 2px;
  background: var(--chip-bg);
  border: 1px solid var(--chip-border);
  border-radius: 14px;
  padding: 2px 3px 2px 9px;
  font-size: 11.5px;
}
.ref-link {
  color: var(--chip-text); text-decoration: none;
  font-weight: 700; line-height: 1.3;
}
.ref-link:hover { text-decoration: underline; }
.ref-del {
  border: none; background: none;
  color: var(--chip-text); opacity: .5;
  cursor: pointer; font-size: 15px;
  padding: 0 4px; line-height: 1;
}
.ref-del:hover { opacity: 1; }

/* ── NOTES ACTIONS ────────────────────────── */
.notes-actions {
  margin-top: 6px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}

.btn-add-ref,
.btn-add-note {
  background: none;
  border: 1.5px dashed var(--chip-border);
  border-radius: 14px;
  padding: 3px 11px;
  font-size: 12px; font-weight: 600;
  color: var(--chip-text);
  cursor: pointer;
  transition: background .15s, border-color .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-add-ref:hover, .btn-add-ref:active { background: var(--chip-bg); }
.btn-add-note {
  border-color: var(--notes-border);
  color: var(--text-sub);
}
.btn-add-note:hover, .btn-add-note:active { background: #fff; }

/* A continued note field can sit after one or more Bible-text chips.
   This makes the natural flow “note → scriptures → more notes” possible. */
.note-block {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--notes-border);
}
.block-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 5px;
}
.block-label {
  font-size: 10.5px;
  font-weight: 800;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text-ref);
}
.btn-remove-block {
  border: none;
  background: transparent;
  color: var(--text-ref);
  font-size: 14px;
  font-weight: 700;
  line-height: 1;
  cursor: pointer;
  padding: 3px 5px;
  border-radius: 5px;
}
.btn-remove-block:hover,
.btn-remove-block:active {
  color: var(--text-sub);
  background: rgba(0,0,0,.04);
}

/* ── SYMPOSIUM PARTS ─────────────────────── */
.symp-parts {
  border-top: 1px solid var(--notes-border);
}

.symp-part {
  border-bottom: 1px solid var(--notes-border);
}
.symp-part:last-child { border-bottom: none; }

.part-hdr {
  display: flex; gap: 8px; align-items: flex-start;
  padding: 9px 13px 4px 22px;
}

.part-bullet {
  color: var(--day-color, var(--fri));
  font-size: 11px; padding-top: 3px; flex-shrink: 0;
}

.part-body { flex: 1; min-width: 0; }

.part-title {
  font-size: 13.5px; font-weight: 700;
  color: var(--text); line-height: 1.3; display: block;
}


/* ── INTERACTIVE PROGRAM ROWS ─────────────── */
.item-simple {
  opacity: 1;
  border-left: 4px solid color-mix(in srgb, var(--day-color, var(--fri)) 70%, white);
  background: linear-gradient(90deg,
    color-mix(in srgb, var(--day-color, var(--fri)) 9%, white),
    var(--card) 42%);
}
.item-simple.item-song { font-weight: 750; }
.item-simple.item-music {
  border-style: solid;
  background: linear-gradient(90deg, #f2eafa, var(--card) 45%);
  border-left-color: var(--badge-drama);
}
.item-simple .item-title { color: var(--text); font-size: 13.5px; font-weight: 700; }
.program-link {
  color: inherit;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.program-link:hover { text-decoration: underline; }
.program-link::after { content: '↗'; font-size: 10px; opacity: .55; }

.prog-ref-links {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 5px;
}
.prog-ref-link {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  border: 1px solid #d8d0c5;
  background: #f8f6f1;
  border-radius: 12px;
  padding: 2px 7px;
  color: #625a51;
  text-decoration: none;
  font-size: 10.5px;
  font-style: normal;
  font-weight: 650;
}
.prog-ref-link:hover, .prog-ref-link:active {
  border-color: var(--day-color, var(--fri));
  color: var(--day-color, var(--fri));
  background: #fff;
}

.speaker-row {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-top: 7px;
}
.speaker-icon { font-size: 13px; opacity: .65; }
.speaker-input {
  width: min(100%, 290px);
  border: 1px solid #ddd5ca;
  border-radius: 7px;
  padding: 5px 8px;
  background: #fbfaf7;
  color: var(--text);
  font: inherit;
  font-size: 12px;
  outline: none;
}
.speaker-input:focus {
  border-color: var(--day-color, var(--fri));
  background: #fff;
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--day-color, var(--fri)) 10%, transparent);
}
.speaker-input::placeholder { color: #aaa197; }

/* ── LANGUAGE + MOBILE HEADER ─────────────── */
.lang-toggle {
  display: inline-flex;
  align-items: stretch;
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  font-size: 11px;
  font-weight: 800;
  user-select: none;
}
.lang-toggle button {
  border: none;
  background: transparent;
  color: var(--text-sub);
  font: inherit;
  padding: 5px 8px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.lang-toggle button.active {
  background: var(--text);
  color: #fff;
}
.btn-print { display: inline-flex; align-items: center; gap: 3px; }

@media (max-width: 520px) {
  .header-top {
    display: block;
    padding: max(9px, env(safe-area-inset-top)) 12px 7px;
  }
  .app-branding {
    min-width: 0;
    margin-bottom: 8px;
  }
  .app-title { font-size: 14px; }
  .header-actions {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) minmax(0, 1fr) auto;
    align-items: stretch;
    width: 100%;
    gap: 5px;
  }
  .btn-hdr {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 0;
    padding: 6px 7px;
  }
  .day-tabs { padding: 5px 12px 9px; }
  .item-hdr { padding-right: 10px; }
}
@media (max-width: 340px) {
  .btn-hdr { font-size: 10.5px; padding: 6px 5px; }
  .lang-toggle button { padding-inline: 7px; }
}
@media print {
  .lang-toggle { display: none !important; }
}

/* ── MODAL OVERLAY ───────────────────────── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.48);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
@media (min-width: 520px) { .modal-bg { align-items: center; } }

.modal-box {
  background: var(--card);
  border-radius: 18px 18px 0 0;
  width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
  padding: 20px 18px 28px;
  animation: slUp .22s ease;
}
@media (min-width: 520px) {
  .modal-box { border-radius: 16px; margin: 16px; }
}

@keyframes slUp {
  from { transform: translateY(30px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.modal-top {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 16px;
}
.modal-top h3 { font-size: 17px; font-weight: 800; }
.modal-x {
  border: none; background: var(--bg);
  border-radius: 50%; width: 32px; height: 32px;
  font-size: 16px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  color: var(--text-sub);
}

.form-row { margin-bottom: 11px; }
.form-row label {
  display: block; font-size: 11px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  color: var(--text-sub); margin-bottom: 4px;
}
.form-row select, .form-row input {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--border); border-radius: 9px;
  font-size: 15px; font-family: inherit;
  background: var(--bg); color: var(--text);
  outline: none; appearance: auto;
}
.form-row select:focus, .form-row input:focus {
  border-color: var(--day-color, var(--fri));
}
.form-inline { display: flex; gap: 9px; }
.form-inline .form-row { flex: 1; }

.ref-preview {
  border: 1px solid var(--chip-border);
  background: var(--chip-bg);
  border-radius: 9px;
  padding: 10px 13px; font-size: 13px;
  font-weight: 700; color: var(--chip-text);
  min-height: 40px; line-height: 1.45;
}
.ref-preview a { color: var(--chip-text); }

.modal-btns { display: flex; gap: 9px; margin-top: 16px; }

.btn-cancel {
  padding: 12px 16px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; font-size: 14px; font-weight: 600;
  cursor: pointer; color: var(--text-sub);
}

.btn-insert {
  flex: 1; padding: 12px;
  background: var(--day-color, var(--fri));
  color: #fff; border: none;
  border-radius: 10px; font-size: 15px; font-weight: 800;
  cursor: pointer;
  transition: opacity .15s;
}
.btn-insert:active { opacity: .85; }

/* ── TOAST ───────────────────────────────── */
.toast {
  position: fixed; bottom: 22px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: #1d1a15; color: #fff;
  padding: 8px 18px; border-radius: 22px;
  font-size: 13px; z-index: 400;
  transition: transform .28s ease;
  pointer-events: none; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── FOOTER ──────────────────────────────── */
.app-footer {
  text-align: center;
  padding: 18px 16px 44px;
  font-size: 11px; color: var(--text-ref);
}

/* ── PRINT ───────────────────────────────── */
@page {
  size: A4 portrait;
  margin: 10mm;
}

@media print {
  html, body {
    width: 100%;
    background: #fff !important;
  }

  .app-header, .notes-actions, .ref-del, .btn-add-ref, .btn-add-note,
  .btn-remove-block, .toast, .modal-bg, .app-footer, .btn-clear-ta { display: none !important; }

  body {
    color: #111;
    font-size: 10.8px;
    line-height: 1.35;
    overflow: visible;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .day-panel {
    display: block !important;
    max-width: none;
    padding: 0;
    margin: 0;
  }
  .day-panel + .day-panel {
    break-before: page;
    page-break-before: always;
    margin-top: 0;
  }

  .print-day-title {
    display: block !important;
    font-size: 16px;
    font-weight: 900;
    line-height: 1.2;
    padding: 0 0 3mm;
    border-bottom: 1.5pt solid #111;
    margin: 0 0 3mm;
    break-after: avoid-page;
    page-break-after: avoid;
  }

  .day-theme {
    padding: 2.2mm 3mm;
    margin-bottom: 2.5mm;
    border-radius: 5px;
    box-shadow: none;
    font-size: 10.5px;
    break-inside: avoid;
    page-break-inside: avoid;
  }
  .day-theme strong { font-size: 8px; margin-top: 1mm; }

  .session-hdr {
    margin: 3.2mm 0 1.8mm;
    padding: 1mm 3mm;
    font-size: 8.5px;
    border-radius: 4px;
    color: #fff !important;
    break-after: avoid-page;
    page-break-after: avoid;
  }

  .item {
    box-shadow: none;
    border: .7pt solid #c8c8c8;
    border-radius: 5px;
    margin-bottom: 1.7mm;
    overflow: visible;
    break-inside: avoid;
    page-break-inside: avoid;
  }

  /* Large symposium cards may continue on the next page,
     but each individual symposium part stays together. */
  .item.print-symposium,
  .item.has-extra-notes,
  .symp-part.has-extra-notes {
    break-inside: auto;
    page-break-inside: auto;
  }
  .item.print-symposium > .item-hdr,
  .item.has-extra-notes > .item-hdr {
    break-after: avoid-page;
    page-break-after: avoid;
  }
  .symp-part {
    break-inside: avoid;
    page-break-inside: avoid;
  }
  .symp-part.has-extra-notes {
    break-inside: auto;
    page-break-inside: auto;
  }

  .item-hdr { padding: 2.2mm 3mm 1.5mm; gap: 2.2mm; }
  .item-time { min-width: 8mm; font-size: 9px; padding-top: .4mm; }
  .item-title { font-size: 10.8px; line-height: 1.25; }
  .badge { font-size: 7.5px; padding: .4mm 1.8mm; margin-bottom: .7mm; }
  .prog-ref-links { gap: 1mm; margin-top: 1mm; }
  .prog-ref-link { font-size: 8px; padding: .4mm 1.6mm; border-radius: 8px; }

  .item-simple {
    opacity: 1;
    padding: 1.6mm 3mm;

function load() {
  try {
    // V1 remains the primary storage key, so all existing notes stay available.
    const raw = localStorage.getItem(SK) || localStorage.getItem(LEGACY_BILINGUAL_SK);
    if (raw) {
      const data = JSON.parse(raw);
      notes = data.notes || {};
      bRefs = data.bRefs || {};
      blocks = data.blocks || {};
      speakers = data.speakers || {};
    }
  } catch(e) {}
}

function save() {
  // Existing v1.3.3/v1.3.4 data remains untouched; “blocks” is simply an optional new field.
  try { localStorage.setItem(SK, JSON.stringify({notes, bRefs, blocks, speakers})); } catch(e) {}
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildUrl(book, ch, v, ve) {
  // JW Finder links can hand off to JW Library where supported;
  // otherwise they open the Online Library in the browser.
  const first = `${String(book.n).padStart(2,'0')}${String(ch).padStart(3,'0')}${String(v || 1).padStart(3,'0')}`;
  const lastVerse = ve || v;
  const range = lastVerse
    ? `${first}-${String(book.n).padStart(2,'0')}${String(ch).padStart(3,'0')}${String(lastVerse).padStart(3,'0')}`
    : first;
  const locale = curLang === 'de' ? 'X' : 'E';
  return `https://www.jw.org/finder?wtlocale=${locale}&pub=nwtsty&bible=${range}`;
}

function buildLabel(bookName, ch, v, ve) {
  if (!ch) return bookName;
  if (!v)  return `${bookName} ${ch}`;
  if (!ve) return `${bookName} ${ch}:${v}`;
  return `${bookName} ${ch}:${v}–${ve}`;
}

  const match = String(programTitle).match(/(?:Lied|Song\s*(?:No\.)?)\s*(\d+)([\s\S]*)$/i);
  if (!match) return null;

  const n = Number(match[1]);
  const data = SONG_DATA[n] && SONG_DATA[n][curLang];
  if (!data) return null;

  const base = curLang === 'de'
    ? 'https://www.jw.org/de/bibliothek/musik-lieder/singt-voller-freude/'
    : 'https://www.jw.org/en/library/music-songs/sing-out-joyfully/';
  const slug = (curLang === 'de' || String(data.slug).startsWith(`${n}-`))
    ? data.slug
    : `${n}-${data.slug}`;

  return { n, title: data.title, tail: match[2] || '', url: `${base}${slug}/` };
}

function scriptureLinkData(segment, inheritedBook) {
  let txt = segment.trim().replace(/[–—]/g, '-');
  let book = inheritedBook;
  let matchedName = '';

  // The English program uses “Psalm”, while the Bible picker uses “Psalms”.
  const aliases = curLang === 'en'
    ? [
        { alias: 'Psalm', bookName: 'Psalms' },
        { alias: 'Song of Songs', bookName: 'Song of Solomon' }
      ]
    : [];

  const named = BOOKS.find(b => txt.toLowerCase().startsWith(b.name.toLowerCase() + ' '));
  if (named) {
    book = named;
    matchedName = named.name;
  } else {
    const aliasMatch = aliases.find(a => txt.toLowerCase().startsWith(a.alias.toLowerCase() + ' '));
    if (aliasMatch) {
      book = BOOKS.find(b => b.name === aliasMatch.bookName) || null;
      matchedName = aliasMatch.alias;
    }
  }

  if (matchedName) txt = txt.slice(matchedName.length).trim();
  if (!book) return null;

  const match = txt.match(/^(\d+)(?::(\d+))?(?:\s*-\s*(\d+))?/);
  if (!match) return null;

  const ch = Number(match[1]);
  const v = match[2] ? Number(match[2]) : null;
  const ve = match[3] ? Number(match[3]) : null;
  return {
    book,
    label: segment.trim().replace(/[–—]/g, '–'),
    url: buildUrl(book, ch, v, ve)
  };
}

function renderProgramRefs(refs) {
  if (!refs) return '';
  let inheritedBook = null;
  const links = refs.split(';').map(seg => {
    const data = scriptureLinkData(seg, inheritedBook);
    if (!data) return `<span class="prog-ref-link">${esc(seg.trim())}</span>`;
    inheritedBook = data.book;
    return `<a class="prog-ref-link" href="${esc(data.url)}" onclick="openScripture('${esc(data.url)}',event)" title="${esc(UI_LANG[curLang].openScripture)}">📖 ${esc(data.label)}</a>`;
  }).join('');
  return `<div class="prog-ref-links">${links}</div>`;
}

function speakerField(id, placeholder) {
  const ui = UI_LANG[curLang];
  const resolvedPlaceholder = placeholder || ui.speaker;
  return `<div class="speaker-row">
    <span class="speaker-icon" aria-hidden="true">👤</span>
    <input class="speaker-input" value="${esc(speakers[id] || '')}" placeholder="${esc(resolvedPlaceholder)}"
      oninput="onSpeaker(this,'${esc(id)}')" autocomplete="off" aria-label="${esc(ui.speakerAria)}">
  </div>`;
}

let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

const NON_NOTE = new Set(['music', 'song']);

function applyLang(lang) {
  curLang = lang === 'de' ? 'de' : 'en';
  localStorage.setItem(LANGKEY, curLang);
  PROG = curLang === 'de' ? PROG_DE : PROG_EN;
  BOOKS = curLang === 'de' ? BOOKS_DE : BOOKS_EN;

  const ui = UI_LANG[curLang];
  document.documentElement.lang = curLang;
  document.getElementById('app-title').textContent = ui.title;
  document.getElementById('app-subtitle').textContent = ui.subtitle;
  document.getElementById('app-footer').textContent = ui.footer;

  document.getElementById('lang-de').classList.toggle('active', curLang === 'de');
  document.getElementById('lang-en').classList.toggle('active', curLang === 'en');

  [
    ['btn-export', 'export', 'exportTitle'],
    ['btn-import', 'import', 'importTitle'],
    ['btn-print', 'print', 'printTitleButton']
  ].forEach(([id, labelKey, titleKey]) => {
    const button = document.getElementById(id);
    button.querySelector('.hdr-label').textContent = ui[labelKey];
    button.title = ui[titleKey];
    button.setAttribute('aria-label', ui[titleKey]);
  });

  ['friday','saturday','sunday'].forEach(dayKey => {
    document.getElementById(`tab-${dayKey}`).textContent = PROG[dayKey].label;
  });

  document.getElementById('modal-title').textContent = ui.modalTitle;
  document.getElementById('lbl-book').textContent = ui.book;
  document.getElementById('lbl-chapter').textContent = ui.chapter;
  document.getElementById('lbl-verse').textContent = ui.verse;
  document.getElementById('lbl-vend').textContent = ui.vend;
  document.getElementById('lbl-preview').textContent = ui.preview;
  document.getElementById('btn-cancel').textContent = ui.cancel;
  document.getElementById('btn-insert').textContent = ui.insert;
  document.getElementById('bp-preview').textContent = ui.placeholderPreview;
  document.getElementById('bp-chapter').placeholder = ui.phCh;
  document.getElementById('bp-verse').placeholder = ui.phV;
  document.getElementById('bp-vend').placeholder = ui.phVe;

  renderAll();
  switchDay(curDay);
}

function toggleLang(lang) {
  applyLang(lang);
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════

function renderAll() {
  fillBookSelect();
  ['friday','saturday','sunday'].forEach(d => renderDay(d));
}

function renderDay(dk) {
  const day = PROG[dk];
  const el  = document.getElementById(`panel-${dk}`);
  let html  = '';

  html += `<div class="print-day-title">${esc(day.label)} — ${esc(UI_LANG[curLang].printTitle)}</div>`;
  html += `<div class="day-theme">
    ${esc(day.theme)}
    <strong>${esc(day.themeRef)}</strong>
  </div>`;

  day.sessions.forEach(sess => {
    html += `<div class="session-hdr">${esc(sess.name)}</div>`;
    sess.items.forEach(item => {
      html += item.type === 'symposium' ? renderSymp(item) : renderItem(item);
    });
  });

  el.innerHTML = html;
  el.querySelectorAll('textarea.notes-ta').forEach(ta => resize(ta));
}

function renderItem(item) {
  const ui = UI_LANG[curLang];

  if (NON_NOTE.has(item.type)) {
    const song = item.type === 'song' ? songInfo(item.title) : null;
    const title = song ? `${ui.song} ${song.n} · ${song.title}` : item.title;
    const content = song
      ? `<a class="program-link" href="${esc(song.url)}" target="_blank" rel="noopener">🎵 ${esc(title)}</a><span class="song-suffix">${esc(song.tail)}</span>`
      : `<span class="program-label">▶️ ${esc(title)}</span>`;

    return `<div class="item item-simple item-${esc(item.type)}">
      <span class="item-time">${esc(item.t||'')}</span>
      <span class="item-title">${content}</span>
    </div>`;
  }

  const badgeClass = `badge-${item.type}`;
  const showSpeaker = item.type !== 'drama';
  const speakerPlaceholder = item.type === 'wt' ? ui.wtSpeaker : ui.speaker;

  const hasExtraNotes = hasBlocks(item.id);

  return `<div class="item${hasExtraNotes ? ' has-extra-notes' : ''}">
    <div class="item-hdr">
      <span class="item-time">${esc(item.t||'')}</span>
      <div class="item-body">
        ${item.lbl ? `<span class="badge ${badgeClass}">${esc(item.lbl)}</span>` : ''}
        <span class="item-title">${esc(item.title)}</span>
        ${renderProgramRefs(item.refs)}
        ${showSpeaker ? speakerField(item.id, speakerPlaceholder) : ''}
      </div>
    </div>
    ${notesArea(item.id)}
  </div>`;
}

function renderSymp(item) {
  const partsHtml = item.parts.map(p => `
    <div class="symp-part${hasBlocks(p.id) ? ' has-extra-notes' : ''}">
      <div class="part-hdr">
        <span class="part-bullet">▸</span>
        <div class="part-body">
          <span class="part-title">${esc(p.title)}</span>
          ${renderProgramRefs(p.refs)}
          ${speakerField(p.id)}
        </div>
      </div>
      ${notesArea(p.id)}
    </div>
  `).join('');

  return `<div class="item print-symposium">
    <div class="item-hdr">
      <span class="item-time">${esc(item.t||'')}</span>
      <div class="item-body">
        <span class="badge badge-symposium">${esc(item.lbl || UI_LANG[curLang].symposium)}</span>
        <span class="item-title">${esc(item.title)}</span>
      </div>
    </div>
    <div class="symp-parts">${partsHtml}</div>
  </div>`;
}

function refChipHtml(reference, id, index) {
  const remove = UI_LANG[curLang].remove;
  return `<span class="ref-chip">
    <a href="${esc(reference.url)}" class="ref-link" onclick="openScripture('${esc(reference.url)}',event)">📖 ${esc(reference.label)}</a>
    <button class="ref-del" onclick="delRef('${esc(id)}',${index})" aria-label="${esc(remove)}" title="${esc(remove)}">×</button>
  </span>`;
}

function hasBlocks(id) {
  return Array.isArray(blocks[id]) && blocks[id].length > 0;
}

function notesArea(id) {
  const ui = UI_LANG[curLang];
  const txt = notes[id] || '';
  const refs = bRefs[id] || [];
  const chips = refs.map((r, i) => refChipHtml(r, id, i)).join('');

  return `<div class="notes-area">
    <div class="notes-wrap">
      <textarea class="notes-ta" id="ta-${esc(id)}"
        placeholder="${esc(ui.notes)}"
        oninput="onNote(this,'${esc(id)}')"
      >${esc(txt)}</textarea>
      <button class="btn-clear-ta${txt ? ' vis' : ''}" id="clr-${esc(id)}"
        onclick="clearNote('${esc(id)}')" aria-label="${esc(ui.clearNotes)}" title="${esc(ui.clearNotes)}">✕</button>
    </div>
    <div class="refs-row" id="rr-${esc(id)}">${chips}</div>
    ${renderExtraBlocks(id)}
    <div class="notes-actions">
      <button class="btn-add-ref" onclick="openBP('${esc(id)}')">${esc(ui.addRef)}</button>
      <button class="btn-add-note" onclick="addNoteBlock('${esc(id)}')">${esc(ui.addNote)}</button>
    </div>
  </div>`;
}

function renderExtraBlocks(id) {
  const ui = UI_LANG[curLang];
  const arr = Array.isArray(blocks[id]) ? blocks[id] : [];

  return arr.map((block, idx) => {
    if (!block || block.type !== 'note') return '';
    const text = block.text || '';
    const blockId = `${id}-b-${idx}`;
    return `<div class="note-block">
      <div class="block-top">
        <span class="block-label">${esc(ui.continuedNotes)}</span>
        <button class="btn-remove-block" onclick="deleteBlock('${esc(id)}',${idx})"
          aria-label="${esc(ui.removeNoteField)}" title="${esc(ui.removeNoteField)}">✕</button>
      </div>
      <div class="notes-wrap">
        <textarea class="notes-ta" id="ta-${esc(blockId)}"
          placeholder="${esc(ui.moreNotes)}"
          oninput="onBlockNote(this,'${esc(id)}',${idx})"
        >${esc(text)}</textarea>
        <button class="btn-clear-ta${text ? ' vis' : ''}" id="clr-${esc(blockId)}"
          onclick="clearBlockNote('${esc(id)}',${idx})" aria-label="${esc(ui.clearMoreNotes)}" title="${esc(ui.clearMoreNotes)}">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
//  NOTE INPUT
// ═══════════════════════════════════════════

function onNote(ta, id) {
  resize(ta);
  notes[id] = ta.value;
  save();
  const clr = document.getElementById(`clr-${id}`);
  if (clr) clr.classList.toggle('vis', ta.value.length > 0);
}

function onSpeaker(input, id) {
  speakers[id] = input.value;
  save();
}

function clearNote(id) {
  const ta = document.getElementById(`ta-${id}`);
  if (!ta) return;
  ta.value = '';
  notes[id] = '';
  save();
  resize(ta);
  const clr = document.getElementById(`clr-${id}`);
  if (clr) clr.classList.remove('vis');
  ta.focus();
}

function ensureBlocks(id) {
  if (!Array.isArray(blocks[id])) blocks[id] = [];
  return blocks[id];
}

function addNoteBlock(id) {
  const arr = ensureBlocks(id);
  const idx = arr.push({type:'note', text:''}) - 1;
  save();
  renderAll();
  switchDay(curDay);
  requestAnimationFrame(() => {
    const ta = document.getElementById(`ta-${id}-b-${idx}`);
    if (ta) {
      resize(ta);
      ta.focus();
    }
  });
}

function deleteBlock(id, idx) {
  if (!Array.isArray(blocks[id])) return;
  blocks[id].splice(idx, 1);
  if (!blocks[id].length) delete blocks[id];
  save();
  renderAll();
  switchDay(curDay);
}

function onBlockNote(ta, id, idx) {
  resize(ta);
  const arr = ensureBlocks(id);
  if (!arr[idx]) return;
  arr[idx].text = ta.value;
  save();
  const clr = document.getElementById(`clr-${id}-b-${idx}`);
  if (clr) clr.classList.toggle('vis', ta.value.length > 0);
}

function clearBlockNote(id, idx) {
  const ta = document.getElementById(`ta-${id}-b-${idx}`);
  if (!ta || !Array.isArray(blocks[id]) || !blocks[id][idx]) return;
  ta.value = '';
  blocks[id][idx].text = '';
  save();
  resize(ta);
  const clr = document.getElementById(`clr-${id}-b-${idx}`);
  if (clr) clr.classList.remove('vis');
  ta.focus();
}

function resize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.max(56, ta.scrollHeight) + 'px';
}

// ═══════════════════════════════════════════
//  DAY SWITCHING
// ═══════════════════════════════════════════

function switchDay(dk) {
  curDay = dk;
  ['friday','saturday','sunday'].forEach(d => {
    const panel = document.getElementById(`panel-${d}`);
    const tab   = document.getElementById(`tab-${d}`);
    const isActive = d === dk;
    panel.classList.toggle('active', isActive);
    tab.classList.toggle('active', isActive);
    if (isActive) {
      // Resize after paint (handles textareas in previously hidden panels)
      requestAnimationFrame(() => {
        panel.querySelectorAll('textarea.notes-ta').forEach(ta => resize(ta));
      });
    }
  });
}

// ═══════════════════════════════════════════
//  BIBLE PICKER
// ═══════════════════════════════════════════

function fillBookSelect() {
  const sel = document.getElementById('bp-book');
  sel.innerHTML = BOOKS.map(b => `<option value="${b.n}">${b.name}</option>`).join('');
}

const DAY_COLORS = { friday:'#c66228', saturday:'#2b7a4e', sunday:'#1b5e8a' };

function openBP(id) {
  bpTarget = id;
  ['bp-chapter','bp-verse','bp-vend'].forEach(i => document.getElementById(i).value = '');
  document.getElementById('bp-preview').textContent = UI_LANG[curLang].placeholderPreview;
  document.getElementById('modal-bible').style.setProperty('--day-color', DAY_COLORS[curDay] || '#c66228');
  document.getElementById('modal-bible').style.display = 'flex';
  setTimeout(() => document.getElementById('bp-chapter').focus(), 250);
}

function closeBiblePicker() {
  document.getElementById('modal-bible').style.display = 'none';
  bpTarget = null;
}

function modalBgClick(e) {
  if (e.target.id === 'modal-bible') closeBiblePicker();
}

function previewRef() {
  const bIdx = parseInt(document.getElementById('bp-book').value) - 1;
  const book = BOOKS[bIdx];
  const ch = document.getElementById('bp-chapter').value;
  const v = document.getElementById('bp-verse').value;
  const ve = document.getElementById('bp-vend').value;
  const preview = document.getElementById('bp-preview');

  if (!book || !ch) {
    preview.textContent = UI_LANG[curLang].placeholderPreview;
    return;
  }

  const label = buildLabel(book.name, ch, v || null, ve || null);
  const url = buildUrl(book, parseInt(ch), v ? parseInt(v) : null, ve ? parseInt(ve) : null);
  preview.innerHTML = `<a href="${esc(url)}" target="_blank" rel="noopener">${esc(label)}</a> ↗`;
}

function insertRef() {
  if (!bpTarget) return;

  const bIdx = parseInt(document.getElementById('bp-book').value) - 1;
  const book = BOOKS[bIdx];
  const ch = document.getElementById('bp-chapter').value;
  const v = document.getElementById('bp-verse').value;
  const ve = document.getElementById('bp-vend').value;

  if (!book || !ch) {
    toast(UI_LANG[curLang].selectBookChapter);
    return;
  }

  const label = buildLabel(book.name, ch, v || null, ve || null);
  const url = buildUrl(book, parseInt(ch), v ? parseInt(v) : null, ve ? parseInt(ve) : null);

  if (!bRefs[bpTarget]) bRefs[bpTarget] = [];
  bRefs[bpTarget].push({ label, url });
  save();

  const row = document.getElementById(`rr-${bpTarget}`);
  if (row) row.innerHTML = (bRefs[bpTarget] || []).map((r, i) => refChipHtml(r, bpTarget, i)).join('');

  toast(`✓ ${label} ${UI_LANG[curLang].referenceAdded}`);
  closeBiblePicker();
}

function delRef(id, index) {
  if (!bRefs[id]) return;
  bRefs[id].splice(index, 1);
  save();

  const row = document.getElementById(`rr-${id}`);
  if (row) row.innerHTML = (bRefs[id] || []).map((r, i) => refChipHtml(r, id, i)).join('');
}

// ═══════════════════════════════════════════
//  SCRIPTURE POPUP
// ═══════════════════════════════════════════

function openScripture(url, e) {
  e.preventDefault();
  const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 640;
  if (isMobile) {
    window.open(url, '_blank');
  } else {
    const w = 440, h = 640;
    const left = Math.round((screen.width  - w) / 2);
    const top  = Math.round((screen.height - h) / 2);
    window.open(url, 'scripture_popup',
      `width=${w},height=${h},left=${left},top=${top},scrollbars=yes,resizable=yes,toolbar=no,menubar=no,location=yes`);
  }
}

// ═══════════════════════════════════════════
//  EXPORT / IMPORT
// ═══════════════════════════════════════════

function exportJSON() {
  const payload = {
    _tool: 'RC 2026 Eternal Happiness Notes',
    _version: '1.3.4',
    _language: curLang,
    _exported: new Date().toISOString(),
    notes,
    bRefs,
    blocks,
    speakers
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const ts = new Date().toISOString().replace(/[:.]/g,'-').slice(0,16);
  a.download = `rc2026-notes-${ts}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast(UI_LANG[curLang].exported);
}

function triggerImport() {
  document.getElementById('import-file').value = '';
  document.getElementById('import-file').click();
}

function doImport(ev) {
  const file = ev.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      const hasData = Object.values(notes).some(v => v)
        || Object.values(bRefs).some(v => v && v.length)
        || Object.values(blocks).some(v => v && v.length)
        || Object.values(speakers).some(v => v);

      if (hasData && !confirm(UI_LANG[curLang].overwriteConfirm)) return;

      notes = data.notes || {};
      bRefs = data.bRefs || {};
      blocks = data.blocks || {};
      speakers = data.speakers || {};
      save();
      renderAll();
      switchDay(curDay);
      toast(UI_LANG[curLang].imported);
    } catch(err) {
      alert(UI_LANG[curLang].importFailed);
    }
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════
//  PRINT PREPARATION
// ═══════════════════════════════════════════

function preparePrintLayout() {
  document.querySelectorAll('.note-block').forEach(block => {
    const ta = block.querySelector('.notes-ta');
    block.classList.toggle('print-empty', !(ta && ta.value.trim()));
  });

  document.querySelectorAll('.notes-area').forEach(area => {
    const mainTa = area.querySelector(':scope > .notes-wrap .notes-ta');
    const refs = area.querySelector(':scope > .refs-row');
    const hasText = !!(mainTa && mainTa.value.trim());
    const hasRefs = !!(refs && refs.children.length);
    const hasExtraNotes = [...area.querySelectorAll('.note-block .notes-ta')]
      .some(ta => ta.value.trim());
    area.classList.toggle('print-empty', !hasText && !hasRefs && !hasExtraNotes);
  });

  document.querySelectorAll('.speaker-row').forEach(row => {
    const input = row.querySelector('.speaker-input');
    row.classList.toggle('print-empty', !(input && input.value.trim()));
  });
}

function cleanupPrintLayout() {
  document.querySelectorAll('.print-empty').forEach(el => el.classList.remove('print-empty'));
}

window.addEventListener('beforeprint', preparePrintLayout);
window.addEventListener('afterprint', cleanupPrintLayout);
